<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能指标分析平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <span>指标平台</span>
            </div>
            <nav class="menu">
                <div class="menu-item active" onclick="showPage('dashboard')">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>管理驾驶舱</span>
                </div>
                <div class="menu-item" onclick="showPage('center')">
                    <i class="fas fa-database"></i>
                    <span>指标中心</span>
                </div>
                <div class="menu-item" onclick="showPage('market')">
                    <i class="fas fa-store"></i>
                    <span>指标市场</span>
                </div>
                <div class="menu-item" onclick="showPage('bloodline')">
                    <i class="fas fa-project-diagram"></i>
                    <span>指标血缘</span>
                </div>
                <div class="menu-item" onclick="showPage('alert')">
                    <i class="fas fa-bell"></i>
                    <span>智能预警</span>
                </div>
                <div class="menu-item" onclick="showPage('agent')">
                    <i class="fas fa-robot"></i>
                    <span>智能应用</span>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <h1 class="header-title" id="page-title">管理驾驶舱</h1>
                <div class="user-info">
                    <i class="fas fa-user-circle" style="margin-right: 8px;"></i>
                    <span>管理员</span>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="page-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block modals %}{% endblock %}

    {% block scripts %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% endblock %}
</body>
</html>
